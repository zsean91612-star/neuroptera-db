<style>
  :root {

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,"Noto Sans TC",sans-serif; background:var(--bg); color:var(--text); }

  header {

  header h1 { font-size:1.15rem; font-weight:700; }

  .header-nav { margin-left:auto; display:flex; gap:.6rem; }
  .header-nav a {

    border-radius:999px; border:1px solid rgba(255,255,255,.35);
    transition:background .15s;
  }
  .header-nav a:hover,.header-nav a.active { background:rgba(255,255,255,.2); color:white; }

  .layout { display:flex; }
  aside {
    width:210px; min-width:210px;
    background:var(--card-bg); border-right:1px solid var(--border);
    padding:1rem .8rem;
    height:calc(100vh - 58px); overflow-y:auto;

  aside h2 { font-size:.7rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:.5rem; }
  .sp-nav-list { list-style:none; }
  .sp-nav-list li a {
    display:flex; justify-content:space-between; align-items:center;
    padding:.3rem .5rem; border-radius:6px;
    text-decoration:none; color:var(--text); font-size:.82rem;

  .sp-nav-list li a:hover { background:var(--accent-light); }

  .sp-nav-list .cnt {

  .sp-nav-list li a.active .cnt { background:rgba(255,255,255,.25); }

    font-size:.68rem; color:var(--muted); font-weight:700;
    margin:.8rem 0 .2rem .3rem; text-transform:uppercase; letter-spacing:.05em;
  }

  main { flex:1; padding:1.2rem; overflow-y:auto; }

  .sp-section {

    background:var(--accent-light); color:var(--accent2);

    border:1.5px solid var(--border); border-radius:8px;
    font-family:inherit; font-size:.88rem; line-height:1.7;

  .expert-notes-list { display:flex; flex-direction:column; gap:.45rem; }
  .expert-note-item {
    padding:.55rem .9rem; border-radius:8px;
    background:#fff8e1; border-left:3px solid #f6a11a;
    font-size:.83rem; line-height:1.65; color:var(--text);

  .expert-sources {
    margin-top:.25rem; font-size:.72rem; color:#b07800; font-style:italic;

  .notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:.5rem; }
  .note-item {
    padding:.55rem .8rem; border-radius:8px;
    background:var(--accent-light); border-left:3px solid var(--accent);
    font-size:.83rem; line-height:1.65; color:var(--text);

  .no-notes { font-size:.83rem; color:var(--muted); font-style:italic; }

  .loc-tag {
    display:inline-flex; align-items:center; gap:.22rem;
    padding:.2rem .6rem; background:white; border:1px solid var(--border);
    border-radius:999px; font-size:.78rem; color:var(--text);
  }
  .loc-tag::before { content:"📍"; font-size:.7rem; }

  .records-row { display:flex; gap:.45rem; overflow-x:auto; padding-bottom:.4rem; }
  .records-row::-webkit-scrollbar { height:4px; }
  .records-row::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .rec-mini {
    min-width:110px; max-width:110px; flex-shrink:0;
    border:1px solid var(--border); border-radius:8px;
    overflow:hidden; background:white;
    text-decoration:none; color:var(--text); display:block;
    transition:box-shadow .12s, transform .12s;
  }
  .rec-mini:hover { box-shadow:0 3px 10px rgba(0,0,0,.13); transform:translateY(-1px); }
  .rec-mini img { width:100%; height:72px; object-fit:cover; display:block; }

  .rec-mini-body { padding:.35rem .42rem; font-size:.69rem; color:var(--muted); }
  .rec-mini-body strong { display:block; color:var(--text); margin-bottom:.08rem; font-size:.73rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  #lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.87); z-index:500; justify-content:center; align-items:center; }

  .save-btn {

  .save-toast {

    border-radius:8px; font-size:.83rem; display:none;
    box-shadow:0 3px 10px rgba(0,0,0,.2); z-index:999;

</style>

pg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2673051032860953"}]}, {"key": "蝶角蛉", "scientific": "", "common": "蝶角蛉", "family": "蝶角蛉科 Ascalaphidae", "count": 42, "locations": ["馬祖東引", "雪見遊憩區", "新北石門"], "photos": ["2595046713994719/b7d5666d6e28016d.jpg", "2545791528920238/5ae034ecdda9e3b9.jpg", "2545791528920238/f14df18c8906ef01.jpg", "3554463194719728/b2e1f45b95962393.jpg", "3554463194719728/d14021ab80f99e93.jpg", "3318985471600836/6847118d4666fa9d.jpg"], "notes": ["完眼蝶角蛉複眼是完整的，這隻目前不在台灣名錄上。", "莊棨州 想請教前輩~~短腹蝶角蛉與刺蝶角蛉最大辨識差異點在哪裡?? 網路資料不多~~還是搞不清 謝謝您!!", "嘎嘎前輩網站上的資訊是鑑定有誤，刺蝶角蛉的名字是來自於雄蟲觸角基部內側有明顯的數個棘刺突起，您的照片是雄蟲，放大來看可以看到。", "這隻應該不是刺蝶角蛉，是需要標本進一步確認的種類", "特徵在背面，這角度看起來是剛羽化刺蝶角蛉", "這個是紋路比較不明顯的褐胸蝶角蛉", "複眼看起來是完整的沒有分成兩塊，是完眼蝶角蛉Protidricerus sp.？", "刺蝶角蛉 #Acheron trux", "歡迎你，三張照片都是刺蝶角蛉，翅膀黃褐色的為雌蟲，這種分布最為普遍、數量最多，標本暫時不大需要，不過還是歡迎多多以影像紀錄並附上時間地點！感謝你！", "Ascalohybris subjacens (Walker, 1853) 褐頂蝶角蛉 | 台灣生物多樣性資訊入口網"], "expert_notes": [], "expert_sources": [], "records": [{"post_id": "2595046713994719", "author": "孫國鈞", "text_preview": "孫國鈞的貼文", "location": "", "img": "2595046713994719/b7d5666d6e28016d.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2595046713994719"}, {"post_id": "2545791528920238", "author": "蔡麗香", "text_preview": "蔡麗香的貼文", "location": "", "img": "2545791528920238/5ae034ecdda9e3b9.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2545791528920238"}, {"post_id": "3554463194719728", "author": "羅美玲", "text_preview": "請教蝶角蛉物種名", "location": "", "img": "3554463194719728/b2e1f45b95962393.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3554463194719728"}, {"post_id": "3318985471600836", "author": "雷宇濤", "text_preview": "雷宇濤的貼文", "location": "", "img": "3318985471600836/6847118d4666fa9d.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3318985471600836"}, {"post_id": "3249619631870754", "author": "李宏傑", "text_preview": "李宏傑的貼文", "location": "", "img": "324961963187075 特徵描述是第一及第二前脛室下僅有一條分脈，是為螳蛉科中翅脈形態相當簡單的屬；如果用過去一些中文的命名方式，大概不是會被叫寡脈螳蛉就是少脈螳蛉之類，所以叫簡脈螳蛉屬是可以的。", "螳蛉科，應該是 #Necyla (中: 簡脈螳蛉屬)"], "expert_notes": [], "expert_sources": [], "records": [{"post_id": "1971257643731758", "author": "陳進明", "text_preview": "救下蛛網突飛入似紅尾蛛蜂的牠", "location": "", "img": "1971257643731758/0a005695726411d5.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/1971257643731758"}, {"post_id": "3511352189030829", "author": "Takun Lahang", "text_preview": "查看洞察報告", "location": "", "img": "3511352189030829/f77cefaa605b427f.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3511352189030829"}, {"post_id": "3079178225581563", "author": "鄭岳宸", "text_preview": "鄭岳宸的貼文", "location": "", "img": "3079178225581563/9a38a4a3ff0bbb61.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3079178225581563"}, {"post_id": "3079171692248883", "author": "鄭岳宸", "text_preview": "鄭岳宸的貼文", "location": "", "img": "3079171692248883/c4ae9a4ca298016c.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3079171692248883"}, {"post_id": "3063345710498148", "author": "李振維", "text_preview": "李振維的貼文", "location": "", "img": "3063345710498148/5e3c70812a28065b.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3063345710498148"}, {"post_id": "2896945970471457", "author": "Kris Lai", "text_preview": "家裡撿到的螳蛉屍體", "location": "", "img": "2896945970471457/77e8be0d15e7498d.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2896945970471457"}, {"post_id": "2834729946693060", "author": "Tyus Ma", "text_preview": "尚無留言", "location": "", "img": "2834729946693060/57f570c64875f466.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2834729946693060"}, {"post_id": "2828047537361301", "author": "雷宇濤", "text_preview": "高雄美術館的路燈撿到的", "location": "高雄美術館", "img": "2828047537361301/e94880404969cfe6.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2 褐蛉科。", "這隻也是Hemerobiidae 褐蛉科？"], "expert_notes": [], "expert_sources": [], "records": [{"post_id": "3139061136259938", "author": "陳奕翔", "text_preview": "陳奕翔的貼文", "location": "", "img": "3139061136259938/a988821f4705e0e1.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3139061136259938"}, {"post_id": "3096705127162206", "author": "林啟淵", "text_preview": "林啟淵的貼文", "location": "", "img": "3096705127162206/8cbc4e8c41157e58.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3096705127162206"}, {"post_id": "3074008392765213", "author": "劉志郁", "text_preview": "劉志郁的貼文", "location": "", "img": "3074008392765213/25b1058a12e56036.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3074008392765213"}, {"post_id": "3075045059328213", "author": "王莆", "text_preview": "王莆的貼文", "location": "", "img": "3075045059328213/aca35a9a423bda05.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3075045059328213"}, {"post_id": "2877932995706088", "author": "曾粲然", "text_preview": "曾粲然的貼文", "location": "", "img": "2877932995706088/cb7ac17d492a6f9e.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2877932995706088"}, {"post_id": "2894567270709327", "author": "莊緯", "text_preview": "莊緯的貼文", "location": "", "img": "2894567270709327/ff1a097b99519fdf.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2894567270709327"}, {"post_id": "2758820147617374", "author": "簡俊哲", "text_preview": "簡俊哲的貼文", "location": "", "img": "2758820147617374/53a58b8b86b7270f.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2758820147617374"}, {"post_id": "2637869443045779", "author": "Hweishan Lai", "text_preview": "翁宏瑋", "location": "", "img": "2637869443045779/469487449d119760.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2637869443045779"}, {"post_id": "2533620963470628", "author": "Janus Olajuan Boediman", "text_preview": "東卯山 - 台中", "locati b6c38a.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2033158816850181"}, {"post_id": "2086888081477254", "author": "葉大詮", "text_preview": "葉大詮的貼文", "location": "", "img": "2086888081477254/14aa082b9893c3be.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/2086888081477254"}]}, {"key": "Neochauliodes sp.", "scientific": "Neochauliodes sp.", "common": "斑魚蛉", "family": "齒蛉科 Corydalidae", "count": 6, "locations": ["台南虎形山"], "photos": ["513573255475419/ba219455314dff82.jpg", "3524866014346113/30067166b8f8d3e5.jpg", "3524866014346113/94389f9f41d5b071.jpg", "1030500217116051/2420e305464984b5.jpg", "852765314889543/527a04ec98ff9d4f.jpg", "1040249812807758/d8eb035d24aba3c6.jpg"], "notes": ["Neochauliodes 斑魚蛉屬 | 台灣生物多樣性資訊入口網", "Neochauliodes屬的鑑別，主要靠體色、翅斑以及生殖節形態，單就生態照(通常翅疊合、腹部不可見)，要做到詳細的種級鑑定有其困難。", "另外，櫛角魚蛉(中國稱南方斑魚蛉)現行使用的學名為Neochauliodes meridionalis Weele, 1910，該種前翅中部斑紋聯會成前緣至Cu脈的大斑。你貼的這隻缺乏該特徵，比較像色斑鬆散的臺灣斑魚蛉Neochauliodes formosanus (Okamoto, 1910)", "賴保成早安 感謝您的確認與說明 主圖為:臺灣斑魚蛉Neochauliodes formosanus (Okamoto, 1910) 再補一張 201406.28崁頭山的雄蟲", "不是唷，這隻應該是 Neochauliodes fraternus (McLachlan, 1869) 汙翅斑魚蛉。可以比較社團先前的文章，這隻的翅膀及前胸的斑紋都不像花邊星齒蛉。", "應為南方斑魚蛉 Neochauliodes meridionalis Weele, 1910。", "應該是Neochauliodes fraternus (McLachlan, 1869) 汙翅斑魚蛉。", "應該是Neochauliodes fraternus (McLachlan, 1869) 汙翅斑魚蛉雄蟲；準魚蛉屬的雄性觸角是鋸齒狀。", "可是這隻頭部並不是黑色的，又和Neochauliodes formosanus (Okamoto, 1910) 台灣斑魚蛉的特徵不符！！", "我覺得比較像 Neochauliodes formosanus (Okamoto, 1910) 台灣斑魚蛉。"], "expert_notes": [], "expert_sources": [], "records": [{"post_id": "513573255475419", "author": "謝怡萱", "text_preview": "謝怡萱的貼文", "location": "", "img": "513573255475419/ba219455314dff82.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/513573255475419"}, {"post_id": "3524866014346113", "author": "高玉玲", "text_preview": "高玉玲的貼文", "location": "", "img": "3524866014346113/30067166b8f8d3e5.jpg", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3524866014346113"}, {"p const SAVED_NOTES = {};

function buildNav() {
  const nav = document.getElementById("sp-nav");
  let lastFamily = "";
  // build map of common→count to detect duplicates
  const commonCount = {};
  SPECIES.forEach(sp => { if (sp.common) commonCount[sp.common] = (commonCount[sp.common]||0)+1; });

  SPECIES.forEach((sp, i) => {
    if (sp.family !== lastFamily) {
      const li = document.createElement("li");
      li.innerHTML = `<div class="family-label">${sp.family || "其他"}</div>`;
      nav.appendChild(li);
      lastFamily = sp.family;
    }
    const li = document.createElement("li");
    // if common name is shared by multiple entries, show key (scientific) instead
    const isDup = sp.common && commonCount[sp.common] > 1;
    const navLabel = isDup ? (sp.key) : (sp.common || sp.key);
    li.innerHTML = `<a href="#sp-${i}">${escHtml(navLabel)} <span class="cnt">${sp.count}</span></a>`;
    nav.appendChild(li);
  });
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        document.querySelectorAll(".sp-nav-list a").forEach(a => {
          a.classList.toggle("active", a.getAttribute("href") === "#" + id);
        });
      }
    });
  }, { threshold: 0.25 });
  document.querySelectorAll(".sp-section").forEach(s => observer.observe(s));
}

function buildSections() {
  const main = document.getElementById("main-content");
  main.innerHTML = SPECIES.map((sp, i) => {
    const displayName = sp.common || sp.key;
    const latin = sp.scientific && sp.scientific !== sp.key ? sp.scientific : "";

    const gallery = sp.photos.length
      ? sp.photos.map(fn => `<img src="images/${fn}" onclick="openLb(this.src)" alt="${escHtml(displayName)}">`).join("")
      : `<div class="no-photo">🦗</div>`;

    const notesHtml = sp.notes.length
      ? `<div class="notes-grid">${sp.notes.map(n => `<div class="note-item">${escHtml(n)}</div>`).join("")}</div>`
      : `<p class="no-notes">尚無識別筆記</p>`;

    const locsHtml = sp.locations.length
      ? sp.locations.map(l => `<span class="loc-tag">${escHtml(l)}</span>`).join("")
      : `<span class="no-notes">—</span>`;

    const recsHtml = sp.records.map(r => {
      const imgPart = r.img
        ? `<img src="images/${r.img}" alt="" onerror="this.parentNode.innerHTML='<div class=rec-mini-noimg>🦗</div>'">`
        : `<div class="rec-mini-noimg">🦗</div>`;
      return `<a class="rec-mini" href="${r.post_url}" target="_blank">
        ${imgPart}
        <div class="rec-mini-body">
          <strong>${escHtml(r.author)}</strong>
          ${escHtml((r.text_preview || "").slice(0, 35))}
        </div>
      </a>`;
    }).join("");

    return `
    <section class="sp-section" id="sp-${i}">
      <div class="sp-header">
        <div>
          <div class="sp-name">${escHtml(displayName)}</div>
          ${latin ? `<div class="sp-latin">${escHtml(latin)}</div>` : ""}
          <div class="sp-badges">
            ${sp.family ? `<span class="badge">${escHtml(sp.family)}</span>` : ""}
          </div>
        </div>
        <div class="sp-count-badge">
          <strong>${sp.count}</strong>筆紀錄
        </div>
      </div>

      <div class="sp-gallery">${gallery}</div>

      <div class="sp-body">
        <div>
          <div class="sp-section-label">✏️ 我的筆記</div>
          <textarea class="my-note" data-sp="${escHtml(sp.key)}"
            placeholder="輸入觀察筆記、導覽解說重點、識別要點…（自動存入瀏覽器）"></textarea>
        </div>

        ${sp.expert_notes && sp.expert_notes.length ? `
        <div>
          <div class="sp-section-label">🎯 專家辨識要點</div>
          <div class="expert-notes-list">
            ${sp.expert_notes.map(n => `<div class="expert-note-item">
              ${escHtml(n)}
              ${sp.expert_sources && sp.expert_sources.length ? `<div class="expert-sources">${escHtml(sp.expert_sources.join('、'))}</div>` : ''}
            </div>`).join('')}
          </div>
        </div>` : ''}

        ${sp.notes.length ? `
        <div>
          <div class="sp-section-label">🔍 識別特徵筆記</div>
          ${notesHtml}
        </div>` : ""}

        ${sp.locations.length ? `
        <div>
          <div class="sp-section-label">📍 常見觀察地點</div>
          <div class="loc-tags">${locsHtml}</div>
        </div>` : ""}

        ${sp.records.length ? `
        <div>
          <div class="sp-section-label">📋 觀察紀錄</div>
          <div class="records-row">${recsHtml}</div>
        </div>` : ""}
      </div>
    </section>`;
  }).join("");

  document.querySelectorAll(".my-note").forEach(ta => {
    const key = "mynote:" + ta.dataset.sp;
    ta.value = localStorage.getItem(key) ?? SAVED_NOTES[ta.dataset.sp] ?? "";
    ta.addEventListener("input", () => localStorage.setItem(key, ta.value));
  });
}

function exportNotes() {
  const notes = {};
  document.querySelectorAll(".my-note").forEach(ta => {
    if (ta.value.trim()) notes[ta.dataset.sp] = ta.value;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "species_notes.json";
  a.click();
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 4000);
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function openLb(src) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lb").classList.add("open");
}
function closeLb() { document.getElementById("lb").classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key==="Escape") closeLb(); });

buildSections();
buildNav();
</script>
</body>
</html>
