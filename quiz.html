<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>脈翅目物種辨識測驗</title>
<style>
  :root{--bg:#f4faf7;--card:#fff;--accent:#2d7a5a;--al:#e8f5ef;--a2:#1a5c3f;--tx:#1a3328;--mu:#5a8070;--bd:#c5ddd4;--ok:#2e7d32;--ng:#c62828;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--tx);}
  header{background:var(--accent);color:#fff;padding:.75rem 1.3rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  header h1{font-size:1.1rem;font-weight:700;}
  header .sub{font-size:.78rem;opacity:.85;}
  .nav{margin-left:auto;display:flex;gap:.55rem;}
  .nav a{color:rgba(255,255,255,.82);text-decoration:none;font-size:.82rem;padding:.22rem .62rem;border-radius:999px;border:1px solid rgba(255,255,255,.35);}
  .nav a:hover,.nav a.active{background:rgba(255,255,255,.2);color:#fff;}

  .quiz-wrap{max-width:640px;margin:1.5rem auto;padding:0 1rem 3rem;}

  .score-bar{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:.65rem 1rem;display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;font-size:.88rem;}
  .s-num{font-weight:700;font-size:1.1rem;color:var(--a2);}
  .s-mu{color:var(--mu);}
  .streak{color:#e65100;font-weight:600;}
  .reset-btn{margin-left:auto;background:none;border:1px solid var(--bd);border-radius:8px;padding:.25rem .7rem;cursor:pointer;font-size:.78rem;color:var(--mu);}
  .reset-btn:hover{background:var(--al);}

  .q-card{background:var(--card);border-radius:14px;border:1px solid var(--bd);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);}
  .q-img-wrap{background:#111;display:flex;align-items:center;justify-content:center;min-height:300px;max-height:420px;overflow:hidden;cursor:zoom-in;position:relative;}
  .q-img-wrap img{width:100%;max-height:420px;object-fit:contain;display:block;}
  .q-num{position:absolute;top:.7rem;left:.7rem;background:rgba(0,0,0,.55);color:#fff;font-size:.75rem;padding:.17rem .6rem;border-radius:999px;}
  .zoom-hint{position:absolute;bottom:.6rem;right:.7rem;background:rgba(0,0,0,.45);color:rgba(255,255,255,.85);font-size:.7rem;padding:.13rem .5rem;border-radius:999px;pointer-events:none;}

  .q-body{padding:1.2rem;}
  .q-prompt{font-size:1rem;font-weight:600;margin-bottom:.95rem;}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;}
  .choice{padding:.7rem .9rem;border:2px solid var(--bd);border-radius:10px;background:#fff;color:var(--tx);font-size:.9rem;font-family:inherit;cursor:pointer;text-align:left;transition:border-color .12s,background .12s,transform .1s;line-height:1.4;}
  .choice:hover:not(:disabled){border-color:var(--accent);background:var(--al);transform:translateY(-1px);}
  .choice:disabled{cursor:default;}
  .choice.correct{border-color:var(--ok);background:#e8f5e9;color:var(--ok);font-weight:600;}
  .choice.wrong{border-color:var(--ng);background:#ffebee;color:var(--ng);}
  .choice.dimmed{opacity:.42;}

  .result{margin-top:1rem;padding:.9rem 1rem;border-radius:10px;display:none;animation:fi .22s ease;}
  .result.show{display:block;}
  @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .verdict{font-size:1rem;font-weight:700;margin-bottom:.65rem;}
  .verdict.ok{color:var(--ok);}
  .verdict.ng{color:var(--ng);}
  .evidence-box{background:var(--al);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:.55rem .8rem;margin-bottom:.65rem;font-size:.82rem;line-height:1.65;color:var(--tx);}
  .evidence-box strong{color:var(--a2);}
  .sci-note{font-size:.78rem;color:var(--mu);font-style:italic;margin-bottom:.55rem;}
  .result-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.75rem;}
  .btn-post{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border-radius:8px;background:#fff;border:1.5px solid var(--bd);color:var(--tx);text-decoration:none;font-size:.83rem;transition:border-color .12s,background .12s;}
  .btn-post:hover{border-color:var(--accent);background:var(--al);}
  .btn-next{flex:1;padding:.5rem 1.2rem;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:.9rem;font-family:inherit;cursor:pointer;font-weight:600;transition:background .12s,transform .1s;}
  .btn-next:hover{background:var(--a2);transform:translateY(-1px);}

  #lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;justify-content:center;align-items:center;cursor:zoom-out;}
  #lb.open{display:flex;}
  #lb img{max-width:95vw;max-height:93vh;object-fit:contain;border-radius:6px;}
  #lb-x{position:fixed;top:1rem;right:1.2rem;color:#fff;font-size:2rem;cursor:pointer;line-height:1;}

  @media(max-width:480px){.choices{grid-template-columns:1fr;}.q-img-wrap{min-height:220px;}}
</style>
</head>
<body>
<header>
  <div>
    <h1>🦋 台灣脈翅目觀察資料庫</h1>
    <div class="sub">脈翅目、廣翅目野外觀察紀錄</div>
  </div>
  <nav class="nav">
    <a href="index.html">野外觀察紀錄</a>
    <a href="species.html">物種圖鑑</a>
    <a href="edu.html">精選辨識</a>
    <a href="quiz.html" class="active">物種測驗</a>
  </nav>
</header>

<div class="quiz-wrap">
  <div class="score-bar">
    <span class="s-mu">答對 / 已答</span>
    <span><span class="s-num" id="s-ok">0</span><span class="s-mu"> / </span><span class="s-num" id="s-tot">0</span></span>
    <span class="streak" id="streak"></span>
    <button class="reset-btn" onclick="resetQuiz()">重置</button>
  </div>
  <div class="q-card">
    <div class="q-img-wrap" id="q-img-wrap" onclick="openLb()">
      <img id="q-img" src="" alt="辨識照片">
      <span class="q-num" id="q-num">#1</span>
      <span class="zoom-hint">🔍 點擊放大</span>
    </div>
    <div class="q-body">
      <div class="q-prompt">這是哪一種脈翅目昆蟲？</div>
      <div class="choices" id="choices"></div>
      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div id="sci-note" class="sci-note"></div>
        <div id="evidence-box" class="evidence-box" style="display:none"></div>
        <div class="result-actions">
          <a class="btn-post" id="btn-post" href="#" target="_blank">📋 原貼文</a>
          <button class="btn-next" onclick="nextQ()">下一題 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="lb" onclick="closeLb()">
  <span id="lb-x" onclick="closeLb()">✕</span>
  <img id="lb-img" src="" alt="">
</div>

"}, {"image": "1959181237581273/2af91eefdb072099.jpg", "species": "褐蛉", "scientific": "Micromus sp.", "evidence": "蕭世祥「#Micromus #pupa #larvae」，花和彥分享造繭行為影片，台灣脈翅目野外採集個體", "post_url": "https://www.facebook.com/groups/483678968464848/posts/1959181237581273", "family": ""}, {"image": "1679130868919646/40a740a3a3a954b4.jpg", "species": "褐蛉", "scientific": "Micromus sp.", "evidence": "蕭世祥「Micromus sp.，我覺得有點興趣」，後追蹤要求標本，#Micromus，台灣野外稀有個體", "post_url": "https://www.facebook.com/groups/483678968464848/posts/1679130868919646", "family": ""}, {"image": "1944210682411662/b000e0be5c0fd9fd.jpg", "species": "褐蛉", "scientific": "Micromus sp.", "evidence": "蕭世祥「#Micromus #pupa」，花和彥拍攝蛹期影片，台灣Hemerobiidae蛹期生活史紀錄", "post_url": "https://www.facebook.com/groups/483678968464848/posts/1944210682411662", "family": ""}, {"image": "3424946064292478/4937239bbf03e41a.jpg", "species": "土阱蟻蛉", "scientific": "Cueta sauteri", "evidence": "林育脩「可能是土阱蟻蛉 Cueta sauteri」，台灣野外蟻蛉確認（暫定）", "post_url": "https://www.facebook.com/groups/483678968464848/posts/3424946064292478", "family": ""}];
const ALL_SP = ["中華斑魚蛉", "中華泥蛉", "優雅平翅草蛉", "刺蝶角蛉", "南方斑魚蛉", "台灣優螳蛉", "台灣斑魚蛉", "台灣草蛉", "台灣蝶角蛉", "台灣螳蛉", "台灣蟻蛉", "土阱蟻蛉", "大斑翼蛉", "完眼蝶角蛉", "寬原完眼蝶角蛉", "寬完眼蝶角蛉", "小白雲蟻蛉", "小點翼蛉", "少紋蟻蛉", "山蛉", "巨彎爪蟻蛉", "彎爪蟻蛉", "後緣斑褐蛉", "斑石蛉", "斑褐蛉", "斑魚蛉", "日本草蛉", "日本螳蛉", "星齒蛉", "暗色準魚蛉", "松村氏網草蛉", "松村網蛉", "條斑寡脈褐蛉", "梯螳蛉", "櫛角蛉", "毛蛉", "汙翅斑魚蛉", "污翅斑魚蛉", "沙阱蟻蛉", "泥蛉", "瑪草蛉", "異平翅草蛉", "瘦狹肩褐蛉", "白斑蟻蛉", "等痣蝶角蛉", "粉蛉", "粗腿蟻蛉", "紅痣草蛉", "紅肩草蛉", "網蛉", "翼蛉", "胸紋蟻蛉", "脈蛉", "脈褐蛉", "臀腋蟻蛉", "花邊星齒蛉", "草蛉", "蛇蛉", "蛾蛉", "蝶角蛉", "螳蛉", "蟻獅", "蟻蛉", "褐胸蝶角蛉", "褐蛉", "褐跗蟻蛉", "褐頂蝶角蛉", "銅頭螳蛉", "雙斑蟻蛉", "魚蛉", "麗紋蟻蛉", "黃紋星齒蛉", "黑色螳蛉", "齒蛉"];

let pool=[], cur=null, qn=0, ok=0, tot=0, streak=0, answered=false;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function distractors(sp, fam, n) {
  // prefer same-family distractors first
  const sameFam = ALL_SP.filter(s => s !== sp && FAMILY_MAP[s] === fam && fam);
  const other   = ALL_SP.filter(s => s !== sp && !(FAMILY_MAP[s] === fam && fam));
  return shuffle([...sameFam, ...other]).slice(0, n);
}
const FAMILY_MAP = {"台灣螳蛉": "螳蛉科", "日本螳蛉": "螳蛉科", "台灣優螳蛉": "螳蛉科", "黑色螳蛉": "螳蛉科", "刺蝶角蛉": "蝶角蛉科", "褐頂蝶角蛉": "蝶角蛉科", "完眼蝶角蛉": "蝶角蛉科", "寬完眼蝶角蛉": "蝶角蛉科", "台灣斑魚蛉": "齒蛉科", "南方斑魚蛉": "齒蛉科", "中華斑魚蛉": "齒蛉科", "污翅斑魚蛉": "齒蛉科", "星齒蛉": "齒蛉科", "暗色準魚蛉": "齒蛉科", "小點翼蛉": "翼蛉科", "大斑翼蛉": "翼蛉科", "雙斑蟻蛉": "蟻蛉科", "白斑蟻蛉": "蟻蛉科", "少紋蟻蛉": "蟻蛉科", "台灣蟻蛉": "蟻蛉科"};

function resetQuiz(){pool=shuffle([...ITEMS]);ok=0;tot=0;streak=0;qn=0;upd();nextQ();}

function nextQ(){
  if(!pool.length) pool=shuffle([...ITEMS]);
  cur=pool.pop(); qn++;
  answered=false;
  document.getElementById("q-img").src="images/"+cur.image;
  document.getElementById("lb-img").src="images/"+cur.image;
  document.getElementById("q-num").textContent="#"+qn;
  document.getElementById("result").classList.remove("show");
  const ds=distractors(cur.species, cur.family, 3);
  const cs=shuffle([cur.species,...ds]);
  document.getElementById("choices").innerHTML=cs.map(s=>
    `<button class="choice" onclick="answer('${esc(s)}')">${esc(s)}</button>`
  ).join("");
}

function answer(chosen){
  if(answered)return;
  answered=true; tot++;
  const right=chosen===cur.species;
  if(right){ok++;streak++;}else{streak=0;}
  upd();
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    const t=b.textContent.trim();
    if(t===cur.species)b.classList.add("correct");
    else if(t===chosen&&!right)b.classList.add("wrong");
    else b.classList.add("dimmed");
  });
  const v=document.getElementById("verdict");
  v.className="verdict "+(right?"ok":"ng");
  v.innerHTML=right?`✅ 答對了！是<strong>${esc(cur.species)}</strong>`:`❌ 答錯了，正解是<strong>${esc(cur.species)}</strong>`;
  const sn=document.getElementById("sci-note");
  sn.textContent=cur.scientific?`學名：${cur.scientific}`:"";
  const eb=document.getElementById("evidence-box");
  if(cur.evidence){eb.innerHTML=`<strong>辨識依據：</strong>${esc(cur.evidence)}`;eb.style.display="block";}
  else{eb.style.display="none";}
  document.getElementById("btn-post").href=cur.post_url||"#";
  document.getElementById("result").classList.add("show");
}

function upd(){
  document.getElementById("s-ok").textContent=ok;
  document.getElementById("s-tot").textContent=tot;
  const s=document.getElementById("streak");
  s.textContent=streak>=3?`🔥 連對${streak}題！`:streak>=2?`連對${streak}題`:"";
}

function openLb(){document.getElementById("lb-img").src="images/"+cur.image;document.getElementById("lb").classList.add("open");}
function closeLb(){document.getElementById("lb").classList.remove("open");}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeLb();
  if((e.key==="Enter"||e.key===" ")&&answered)nextQ();
});
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/'/g,"&#39;");}

resetQuiz();
</script>
</body>
</html>
